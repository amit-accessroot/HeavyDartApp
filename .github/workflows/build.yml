name: Flutter Dart APK Builder Master

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड को गिटहब रनर पर लोड करना
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. जावा एनवायरनमेंट सेट करना (एंड्रॉइड के लिए ज़रूरी)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. फ्लटर और डार्ट का सबसे स्थिर (Stable) वर्जन चालू करना
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 4. गायब या खराब एंड्रॉइड फोल्डर को पूरी तरह से री-बिल्ड करना (जादुई स्टेप)
    - name: Re-create Android Project Structure
      run: |
        flutter create --platforms=android .

    # 5. डार्ट पैकेज और प्लगइन्स डाउनलोड करना
    - name: Install Dependencies
      run: flutter pub get

    # 6. बिना किसी एरर के सीधा APK कंपाइल करना
    - name: Build Debug APK
      run: flutter build apk --debug

    # 7. तैयार APK को डाउनलोड के लिए अपलोड करना
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MyHeavyDartApp-Master
        path: build/app/outputs/flutter-apk/app-debug.apk
