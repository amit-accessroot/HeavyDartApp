name: "🚀 Flutter Ultimate APK Builder Pro"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # [स्टेप 1]: सोर्स कोड लोड करना
    - name: "📂 1. Fetching Project Source Code"
      uses: actions/checkout@v4

    # [स्टेप 2]: जावा 17 सेट करना
    - name: "☕ 2. Setting up Java Environment (JDK 17)"
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # [स्टेप 3]: फ्लटर स्टेबल वर्जन सेट करना
    - name: "💙 3. Initializing Flutter Stable Environment"
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # [स्टेप 4]: पुराने खराब एंड्रॉइड फोल्डर को हटाकर बिल्कुल नया और सही स्ट्रक्चर बनाना
    - name: "🛠️ 4. Re-creating Clean Android Project Structure"
      run: |
        # अगर पुराना कोई एंड्रॉइड फोल्डर है तो उसे पूरी तरह डिलीट करना ताकि एरर न आए
        rm -rf android
        # बिल्कुल फ्रेश एंड्रॉइड स्ट्रक्चर तैयार करना
        flutter create --platforms=android --org com.professional .

    # [स्टेप 5]: पैकेजेस डाउनलोड करना
    - name: "📦 5. Fetching Required Dart & Flutter Packages"
      run: flutter pub get

    # [स्टेप 6]: बिना किसी एरर के सीधा APK कंपाइल करना
    - name: "🏗️ 6. Compiling High-Performance Debug APK"
      run: flutter build apk --debug

    # [स्टेप 7]: तैयार APK को अपलोड करना
    - name: "📥 7. Uploading Finished APK to Artifacts"
      uses: actions/upload-artifact@v4
      with:
        name: "My-Professional-Dart-App"
        path: build/app/outputs/flutter-apk/app-debug.apk
